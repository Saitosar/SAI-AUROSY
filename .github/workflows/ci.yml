name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test -v ./...
        env:
          NATS_URL: nats://localhost:4222

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run E2E
        run: |
          docker compose build
          docker compose up -d
          echo "Waiting for Control Plane to be ready..."
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080/ready | grep -q 200; then
              echo "Control Plane ready"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Control Plane did not become ready in 60s"
              docker compose logs control-plane
              exit 1
            fi
            sleep 1
          done
          bash scripts/e2e.sh
        env:
          API_URL: http://localhost:8080

  e2e-auth:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run E2E with auth and multi-tenant
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml build
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d
          echo "Waiting for Control Plane to be ready..."
          for i in $(seq 1 90); do
            if curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080/ready | grep -q 200; then
              echo "Control Plane ready"
              break
            fi
            if [ $i -eq 90 ]; then
              echo "Control Plane did not become ready in 90s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs control-plane
              exit 1
            fi
            sleep 1
          done
          E2E_API_KEY=e2e-api-key bash scripts/e2e.sh
          bash scripts/e2e-tenant.sh
        env:
          API_URL: http://localhost:8080
