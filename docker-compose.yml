services:
  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-m", "8222"]

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    ports:
      - "8080:8080"
    environment:
      NATS_URL: nats://nats:4222
      CONTROL_PLANE_ADDR: ":8080"
      ALLOW_UNSAFE_NO_AUTH: "true"
      # Phase 2.1 (опционально):
      # REGISTRY_DB_DRIVER: sqlite
      # REGISTRY_DB_DSN: file:/data/registry.db
      # LOG_FORMAT: json
      # Cognitive Gateway (Phase 3.2) — set COGNITIVE_PROVIDER=http and URLs for Gemini:
      COGNITIVE_PROVIDER: http
      COGNITIVE_HTTP_TRANSCRIBE_URL: http://gemini-adapter:8001/transcribe
      COGNITIVE_HTTP_SYNTHESIZE_URL: http://gemini-adapter:8001/synthesize
      COGNITIVE_HTTP_INTENT_URL: http://gemini-adapter:8001/understand-intent
      COGNITIVE_HTTP_TRANSLATE_URL: http://gemini-adapter:8001/translate
      # COGNITIVE_HTTP_API_KEY: <optional-api-key>
    depends_on:
      - nats
      - gemini-adapter

  operator-console:
    build:
      context: .
      dockerfile: Dockerfile.console
    ports:
      - "3000:80"
    depends_on:
      - control-plane
      - gemini-live-adapter

  agibot-adapter:
    build:
      context: .
      dockerfile: Dockerfile.adapter
    environment:
      ROBOT_ID: x1-001
      NATS_URL: nats://nats:4222
      AGIBOT_MOCK: "1"
    depends_on:
      - nats

  unitree-adapter:
    build:
      context: .
      dockerfile: Dockerfile.adapter.unitree
    environment:
      ROBOT_ID: go2-001
      NATS_URL: nats://nats:4222
      UNITREE_MOCK: "1"
    depends_on:
      - nats

  gemini-adapter:
    build:
      context: ./examples/integration/gemini-adapter
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: "8001"

  gemini-live-adapter:
    build:
      context: ./examples/integration/gemini-live-adapter
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: "8002"

  webhook-receiver:
    build:
      context: ./examples/integration/webhook-receiver
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
