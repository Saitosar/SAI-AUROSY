name: repeated_request
description: "Second request arrives while robot is busy - system must define and validate expected behavior"
robot_id: sim-001
preconditions:
  - robot_online: true
steps:
  - action: start_mall_assistant
  - action: submit_visitor_request
    text: "Where is Nike?"
  - action: wait
    timeout_sec: 2
  - action: submit_visitor_request
    text: "Where is Adidas?"
  - action: wait_navigation_complete
    timeout_sec: 60
  - action: wait_return_complete
    timeout_sec: 60
assertions:
  - type: final_robot_state
    state: IDLE
  - type: task_status
    scenario_id: mall_assistant
    status: completed
  # Expected: first request (Nike) is processed; second may be queued or rejected per platform behavior
