name: happy_path
description: "Full Mall Assistant flow - visitor asks for Nike, robot navigates, arrives, returns to base, ends in IDLE"
robot_id: sim-001
preconditions:
  - robot_online: true
  - robot_at_base: true
steps:
  - action: start_mall_assistant
  - action: submit_visitor_request
    text: "Where is Nike?"
  - action: wait
    timeout_sec: 3
  - action: wait_navigation_complete
    timeout_sec: 60
  - action: wait_return_complete
    timeout_sec: 60
assertions:
  - type: final_robot_state
    state: IDLE
  - type: task_status
    scenario_id: mall_assistant
    status: completed
  - type: event_sequence
    events:
      - visitor_interaction_started
      - mall_store_resolved
      - navigation_started
      - navigation_completed
      - visitor_interaction_finished
  - type: telemetry_field_present
    field: distance_to_target
