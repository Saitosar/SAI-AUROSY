name: manual_override
description: "Operator control interrupts automation - priority model must behave correctly"
robot_id: sim-001
preconditions:
  - robot_online: true
steps:
  - action: start_mall_assistant
  - action: submit_visitor_request
    text: "Where is Nike?"
  - action: wait
    timeout_sec: 5
  - action: inject_safe_stop
  - action: wait
    timeout_sec: 5
assertions:
  - type: safe_stop_received
  - type: telemetry_field_present
    field: position
