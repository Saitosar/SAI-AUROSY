name: navigation_timeout
description: "Robot never arrives - timeout triggers failure path"
robot_id: sim-001
failure_config:
  type: navigation_timeout
  after_command: navigate_to
preconditions:
  - robot_online: true
steps:
  - action: start_mall_assistant
  - action: submit_visitor_request
    text: "Where is Nike?"
  - action: wait_navigation_complete
    timeout_sec: 35
assertions:
  - type: timeout_triggered
  - type: task_status
    scenario_id: navigate_to_store
    status: failed
