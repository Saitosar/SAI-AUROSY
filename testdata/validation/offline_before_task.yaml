name: offline_before_task
description: "Robot is offline before navigation begins - task must fail cleanly"
robot_id: sim-001
failure_config:
  type: offline_mid_route
  after_ticks: 0
preconditions:
  - robot_at_base: true
steps:
  - action: start_mall_assistant
  - action: submit_visitor_request
    text: "Where is Nike?"
  - action: wait_navigation_complete
    timeout_sec: 35
assertions:
  - type: robot_offline_causes_failure
  - type: task_status
    scenario_id: navigate_to_store
    status: failed
