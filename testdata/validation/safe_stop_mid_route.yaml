name: safe_stop_mid_route
description: "Robot receives safe_stop during navigation - movement stops, lifecycle recorded correctly"
robot_id: sim-001
failure_config:
  type: safe_stop_mid_route
  when_distance_lt: 8
preconditions:
  - robot_online: true
steps:
  - action: start_mall_assistant
  - action: submit_visitor_request
    text: "Where is Nike?"
  - action: wait_navigation_complete
    timeout_sec: 35
assertions:
  - type: safe_stop_received
  - type: task_status
    scenario_id: navigate_to_store
    status: failed
