name: delayed_arrival
description: "Robot arrives later than normal but before timeout - scenario still succeeds"
robot_id: sim-001
failure_config:
  type: delayed_arrival
  slowdown_factor: 0.3
  duration_ticks: 20
preconditions:
  - robot_online: true
steps:
  - action: start_mall_assistant
  - action: submit_visitor_request
    text: "Where is Nike?"
  - action: wait_navigation_complete
    timeout_sec: 90
  - action: wait_return_complete
    timeout_sec: 90
assertions:
  - type: final_robot_state
    state: IDLE
  - type: task_status
    scenario_id: mall_assistant
    status: completed
