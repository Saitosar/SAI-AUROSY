# Split mode: Control Plane and Workforce as separate services.
# Use: docker compose -f docker-compose.yml -f docker-compose.split.yml up -d
#
# Requires PostgreSQL. Both Control Plane and Workforce share the same DB and NATS.
# See docs/architecture/control-plane-workforce-split.md for scaling scenarios.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saiaurosy
      POSTGRES_PASSWORD: saiaurosy
      POSTGRES_DB: saiaurosy
    volumes:
      - postgres_split_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saiaurosy"]
      interval: 5s
      timeout: 5s
      retries: 5

  control-plane:
    environment:
      WORKFORCE_REMOTE: "true"
      REGISTRY_DB_DRIVER: pgx
      REGISTRY_DB_DSN: postgres://saiaurosy:saiaurosy@postgres:5432/saiaurosy?sslmode=disable
    stop_grace_period: 35s
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy

  workforce:
    build:
      context: .
      dockerfile: Dockerfile.workforce
    ports:
      - "9090:9090"
    environment:
      NATS_URL: nats://nats:4222
      REGISTRY_DB_DRIVER: pgx
      REGISTRY_DB_DSN: postgres://saiaurosy:saiaurosy@postgres:5432/saiaurosy?sslmode=disable
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    stop_grace_period: 30s

volumes:
  postgres_split_data:
